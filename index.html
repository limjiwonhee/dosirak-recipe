<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도시락 레시피 🍱</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-top">
        <h1>🍱 도시락 레시피</h1>
        <p class="subtitle">유튜브로 찾는 직장인 도시락 &amp; 밀프렙</p>
      </div>
      <div class="header-tags">
        <span class="htag">🍱 도시락</span>
        <span class="htag">🥗 콜드밀</span>
        <span class="htag">📦 전자레인지 가능</span>
        <span class="htag">⏱ 간단 레시피</span>
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <div class="search-section">
        <div class="tabs" role="tablist">
          <button class="tab active" data-lang="all" role="tab">전체</button>
          <button class="tab" data-lang="kr" role="tab">🇰🇷 한국어</button>
          <button class="tab" data-lang="jp" role="tab">🇯🇵 日本語</button>
          <button class="tab" data-lang="en" role="tab">🇺🇸 English</button>
        </div>
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            placeholder="레시피를 검색해보세요..."
            autocomplete="off"
          />
          <button id="searchBtn" aria-label="검색">검색</button>
        </div>
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>레시피를 불러오는 중...</p>
      </div>

      <div id="results" class="results-grid"></div>

      <div id="noResults" class="no-results hidden">
        <p>😢 검색 결과가 없어요. 다른 키워드로 시도해보세요!</p>
      </div>

    </div>
  </main>

  <footer>
    <p>YouTube Data API v3 기반</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
